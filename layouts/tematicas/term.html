{{ define "main" }}
<div style="max-width: 1000px; margin: 4rem auto; padding: 0 5%;">
    
    <!-- ENCABEZADO DE LA TEMÁTICA -->
    <div style="text-align: center; margin-bottom: 4rem; padding-bottom: 2rem; border-bottom: 2px solid var(--color-bordes);">
        <span style="text-transform: uppercase; font-weight: bold; color: var(--color-secundario); letter-spacing: 2px; font-size: 0.9rem;">Archivo de Temática</span>
        <h1 style="font-family: var(--fuente-titulos); font-size: 3rem; color: var(--color-primario); margin-top: 0.5rem;">
            {{ .Title }}
        </h1>
    </div>

    <!-- GRILLA DE NOTAS -->
    <div class="grilla-noticias" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 2rem; justify-content: start;">
        
        <!-- Hugo automáticamente trae las páginas de esta temática en .Pages -->
        {{ range .Pages }}
        <article class="tarjeta-noticia" style="background: var(--color-blanco); max-width: 350px; width: 100%; position: relative; border: 1px solid var(--color-bordes); border-radius: 4px; overflow: hidden;">
            {{ $urlFoto := or .Params.image .Params.imagen }}
            {{ if $urlFoto }}
            <img src="{{ $urlFoto }}" alt="{{ .Title | plainify }}" class="foto-miniatura" style="width: 100%; height: 200px; object-fit: cover; border-bottom: 1px solid var(--color-bordes);">
            {{ end }}
            
            <!-- ETIQUETA Y FECHA ALINEADAS -->
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
    <!-- Etiqueta de la sección -->
    <span style="font-size: 0.75rem; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; color: var(--color-secundario); border-bottom: 1px solid var(--color-secundario); padding-bottom: 0.2rem;">
        {{ .Section }}
    </span>
    
    <!-- Fecha de publicación -->
    <span style="font-size: 0.8rem; color: var(--color-texto); opacity: 0.7;">
        {{ .Date.Format "02/01/2006" }}
    </span>
</div>
                
                <h3 style="font-family: var(--fuente-titulos); font-size: 1.3rem; line-height: 1.3; margin-bottom: 0;">
    <a href="{{ .RelPermalink }}" style="color: var(--color-texto); text-decoration: none;">
        {{ .Title | markdownify }}
    </a>
</h3>
            </div>
            <a href="{{ .RelPermalink }}" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10;"></a>
        </article>
        {{ end }}

    </div>
</div>
{{ end }}
