{{ define "main" }}
<div class="hero">
    <h1>Análisis de Política y Sociedad</h1>
</div>

<section class="seccion-noticias">
    <h2>Últimas Publicaciones</h2>
    <div class="grilla-noticias">
        
        {{ range where .Site.RegularPages "Section" "!=" "" }}
        <article class="tarjeta-noticia" style="max-width: 350px; width: 100%; margin-bottom: 2rem;">
            
            {{ if .Params.imagen }}
            <img src="{{ .Params.imagen }}" alt="{{ .Title }}" class="foto-miniatura" loading="lazy">
            {{ else }}
            <div class="foto-miniatura"></div>
            {{ end }}
            
            <div class="info-noticia" style="padding: 1rem;">
                <div class="metadatos" style="display: flex; align-items: baseline; gap: 8px; font-family: var(--fuente-principal); font-size: 0.82rem; color: var(--color-secundario); margin-bottom: 0.6rem; white-space: nowrap;">
                    
                    <span class="etiqueta" style="text-transform: uppercase; font-weight: 700; color: var(--color-primario); letter-spacing: 0.5px;">{{ .Section }}</span>
                    
                    <span style="width: 4px; height: 4px; background-color: var(--color-bordes); border-radius: 50%; flex-shrink: 0; align-self: center; transform: translateY(-1px);"></span>
                    
                    <time datetime="{{ .Date.Format "2006-01-02" }}" class="fecha">{{ .Date.Format "02/01/2006" }}</time>
                </div>
                
                <h3 style="margin: 0; font-family: var(--fuente-titulos); font-size: 1.25rem; line-height: 1.3;">
                    <a href="{{ .Permalink }}" style="text-decoration: none; color: var(--color-primario);">{{ .Title }}</a>
                </h3>
            </div>
        </article>
        {{ end }}

    </div>
</section>
{{ end }}
