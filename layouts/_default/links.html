{{ define "main" }}
<div style="max-width: 400px; margin: 2rem auto 4rem auto; padding: 0 1.5rem; text-align: center; display: flex; flex-direction: column; align-items: center; min-height: 70vh;">
    
    <!-- Avatar / Logo -->
    <div style="width: 100px; height: 100px; background-color: var(--color-primario); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 1rem; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
        <span style="color: var(--color-fondo); font-family: var(--fuente-titulos); font-size: 2.5rem; font-weight: bold;">M58</span>
    </div>
    
    <h1 style="font-family: var(--fuente-titulos); font-size: 1.8rem; margin-bottom: 0.2rem; color: var(--color-texto);">Meridiano 58</h1>
    <p style="color: var(--color-secundario); margin-bottom: 2rem; font-size: 0.95rem;">Análisis de política y sociedad.</p>

    <!-- Estilos de los botones -->
    <style>
        .boton-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 1.2rem 1rem;
            margin-bottom: 1rem;
            background-color: transparent;
            color: var(--color-texto);
            text-decoration: none;
            border: 2px solid var(--color-bordes);
            border-radius: 12px;
            font-family: var(--fuente-principal);
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.2s ease;
        }
        .boton-link:hover {
            border-color: var(--color-primario);
            background-color: rgba(255, 255, 255, 0.05); /* Un brillo sutil al tocar */
            transform: translateY(-2px);
        }
        .boton-destacado {
            background-color: var(--color-primario);
            color: #ffffff !important;
            border-color: var(--color-primario);
        }
        .boton-destacado:hover {
            background-color: #a32222; /* Un rojo un poco más oscuro */
        }
    </style>

  <!-- Botones estratégicos -->
