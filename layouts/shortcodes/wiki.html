{{ $palabra := .Get 0 }}
{{ $definicion := .Get 1 }}

<span class="burbuja-wiki" style="position: relative; display: inline-block; cursor: help; border-bottom: 1px dashed var(--color-secundario); color: var(--color-primario); font-weight: bold;">
    {{ $palabra }}
    
    <!-- La caja de la definición (oculta por defecto) -->
    <span class="burbuja-texto" style="visibility: hidden; width: max-content; max-width: 250px; background-color: var(--color-primario); color: var(--color-blanco); text-align: center; border-radius: 6px; padding: 0.6rem 1rem; position: absolute; z-index: 50; bottom: 130%; left: 50%; transform: translateX(-50%); opacity: 0; transition: opacity 0.2s ease, bottom 0.2s ease; font-size: 0.85rem; font-weight: normal; line-height: 1.4; box-shadow: 0px 4px 12px rgba(0,0,0,0.15); font-family: var(--fuente-principal);">
        {{ $definicion }}
        <!-- La flechita hacia abajo -->
        <span style="position: absolute; top: 100%; left: 50%; margin-left: -6px; border-width: 6px; border-style: solid; border-color: var(--color-primario) transparent transparent transparent;"></span>
    </span>
</span>

<!-- CSS para activar la burbuja al pasar el mouse -->
<style>
.burbuja-wiki:hover .burbuja-texto {
    visibility: visible !important;
    opacity: 1 !important;
    bottom: 150% !important; /* Hace un pequeño efecto de que "sube" al aparecer */
}
</style>
