<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel Editorial | Meridiano 58</title>
    <!-- Script de Netlify Identity -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <!-- Decap CMS -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    
    <!-- Redirección -->
    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", user => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });
      }
    </script>

    <script>
    // Inyectamos la hoja de estilos de tu sitio a la previsualización
    CMS.registerPreviewStyle("assets/style.css");
    CMS.registerPreviewStyle("/admin/preview.css");
  </script>

  <script>
    CMS.registerEditorComponent({
    id: "frase-destacada",
    label: "Frase Destacada",
    fields: [
      {
        name: "texto",
        label: "Cita o frase a destacar",
        widget: "text" // Usamos "text" para que te deje apretar Enter y hacer varios renglones si la frase es larga
      },
      {
        name: "autor",
        label: "Autor de la frase (Dejar en blanco si no tiene)",
        widget: "string",
        required: false
      }
    ],
    // Cómo lee el CMS el código si ya está escrito
    pattern: /^{{< destacado(?: autor="(.*?)")? >}}\n([\s\S]*?)\n{{< \/destacado >}}$/m,
    
    fromBlock: function(match) {
      return {
        autor: match[1] || '',
        texto: match[2] || ''
      };
    },
    // Cómo lo inyecta en el archivo .md
    toBlock: function(obj) {
      if (obj.autor) {
        return `{{< destacado autor="${obj.autor}" >}}\n${obj.texto}\n{{< /destacado >}}`;
      } else {
        return `{{< destacado >}}\n${obj.texto}\n{{< /destacado >}}`;
      }
    },
    // Cómo te lo muestra en la previsualización del CMS
    toPreview: function(obj) {
      return `<blockquote style="border-left: 4px solid #a8b8c8; padding-left: 1rem; font-style: italic;">
        ${obj.texto}<br>
        <small style="font-weight:bold; text-transform: uppercase;">— ${obj.autor || ''}</small>
      </blockquote>`;
    }
  });

  // 1. MAPA GEOPOLÍTICO[cite: 1]
  CMS.registerEditorComponent({
    id: "mapa",
    label: "📍 Insertar Mapa",
    fields: [
      {name: "lat", label: "Latitud", widget: "string", default: "-34.6037"},
      {name: "lon", label: "Longitud", widget: "string", default: "-58.3816"},
      {name: "zoom", label: "Nivel de Zoom", widget: "number", default: 5, valueType: "int"},
      {name: "texto", label: "Etiqueta", widget: "string"}
    ],
    pattern: /^{{< mapa lat="(.*?)" lon="(.*?)" zoom="(.*?)" texto="(.*?)" >}}$/,
    fromBlock: function(match) {
      return { lat: match[1], lon: match[2], zoom: match[3], texto: match[4] };
    },
    toBlock: function(obj) {
      return `{{< mapa lat="${obj.lat || '-34.6037'}" lon="${obj.lon || '-58.3816'}" zoom="${obj.zoom || 5}" texto="${obj.texto || ''}" >}}`;
    },
    toPreview: function(obj) {
      return `<div style="padding: 1rem; border: 1px solid #ccc; text-align: center;">📍 Mapa: ${obj.texto} (${obj.lat}, ${obj.lon})</div>`;
    }
  });

  // 2. GRÁFICO ESTADÍSTICO (Chart.js)[cite: 2]
  CMS.registerEditorComponent({
    id: "chart",
    label: "📊 Insertar Gráfico",
    fields: [
      {name: "type", label: "Tipo (line, bar, pie)", widget: "string", default: "line"},
      {name: "title", label: "Título del gráfico", widget: "string"},
      {name: "data", label: "Datos (Formato JSON)", widget: "text"}
    ],
    pattern: /^{{< chart type="(.*?)" title="(.*?)" data='(.*?)' >}}$/,
    fromBlock: function(match) {
      return { type: match[1], title: match[2], data: match[3] };
    },
    toBlock: function(obj) {
      return `{{< chart type="${obj.type || 'line'}" title="${obj.title || ''}" data='${obj.data || ''}' >}}`;
    },
    toPreview: function(obj) {
      return `<div style="padding: 1rem; border: 1px solid #ccc; text-align: center;">📊 Gráfico: ${obj.title}</div>`;
    }
  });

  // 3. CONTENEDOR INTERACTIVO (Ej: KnightLab)[cite: 3]
  CMS.registerEditorComponent({
    id: "interactivo",
    label: "⏱️ Contenedor Iframe",
    fields: [
      {name: "url", label: "URL del recurso", widget: "string"},
      {name: "alto", label: "Alto en píxeles", widget: "string", default: "650"}
    ],
    pattern: /^{{< interactivo "(.*?)" "(.*?)" >}}$/,
    fromBlock: function(match) {
      return { url: match[1], alto: match[2] };
    },
    toBlock: function(obj) {
      return `{{< interactivo "${obj.url || ''}" "${obj.alto || '650'}" >}}`;
    },
    toPreview: function(obj) {
      return `<div style="padding: 1rem; border: 1px solid #ccc; text-align: center;">⏱️ Iframe interactivo cargado</div>`;
    }
  });

  // Burbuja Wikipedia
  CMS.registerEditorComponent({
    // Nombre interno del componente
    id: "burbuja-wiki",
    // Nombre que vas a ver en el botón del CMS
    label: "Burbuja Wiki",
    // Los campos que te va a pedir el formulario cuando toques el botón
    fields: [
      {
        name: "palabra",
        label: "Palabra a destacar (La que se ve en el texto)",
        widget: "string"
      },
      {
        name: "definicion",
        label: "Definición (La que aparece al pasar el mouse)",
        widget: "string"
      }
    ],
    // Cómo hace el CMS para reconocer si ya escribiste esto en el código
    pattern: /{{< wiki "([^"]+)" "([^"]+)" >}}/,
    
    // Cómo lee los datos
    fromBlock: function(match) {
      return {
        palabra: match[1],
        definicion: match[2]
      };
    },
    // Cómo lo escribe en tu archivo .md al guardar
    toBlock: function(obj) {
      return `{{< wiki "${obj.palabra}" "${obj.definicion}" >}}`;
    },
    // Cómo te lo muestra en la vista previa del CMS (algo simple para guiarte)
    toPreview: function(obj) {
      return `<span style="border-bottom: 2px dashed #1a2b3c; cursor: help;" title="${obj.definicion}">${obj.palabra}</span>`;
    }
  });

  CMS.registerEditorComponent({
    id: "pregunta-entrevista",
    label: "Pregunta Entrevista",
    fields: [
      {
        name: "pregunta",
        label: "Texto de la pregunta",
        widget: "text"
      }
    ],
    // Cómo lee el CMS el código si ya está escrito
    pattern: /^{{< pregunta >}}\n([\s\S]*?)\n{{< \/pregunta >}}$/m,
    
    fromBlock: function(match) {
      return {
        pregunta: match[1] || ''
      };
    },
    // Cómo lo inyecta en el archivo .md
    toBlock: function(obj) {
      return `{{< pregunta >}}\n${obj.pregunta}\n{{< /pregunta >}}`;
    },
    // Cómo te lo muestra en la previsualización del CMS
    toPreview: function(obj) {
      return `<p style="font-weight: bold; border-left: 3px solid #a8b8c8; padding-left: 1rem;">${obj.pregunta}</p>`;
    }
  });

  // 4. REPRODUCTOR DE SPOTIFY[cite: 4]
  CMS.registerEditorComponent({
    id: "spotify",
    label: "🎧 Episodio de Spotify",
    fields: [
      {name: "id", label: "ID del Episodio (Ej: 4d28x...)", widget: "string"}
    ],
    pattern: /^{{< spotify "(.*?)" >}}$/,
    fromBlock: function(match) {
      return { id: match[1] };
    },
    toBlock: function(obj) {
      return `{{< spotify "${obj.id || ''}" >}}`;
    },
    toPreview: function(obj) {
      return `<div style="padding: 1rem; border: 1px solid #1DB954; background: #000; color: #1DB954; text-align: center;">🎧 Spotify Embed: ${obj.id}</div>`;
    }
  });

  // 5. CAJA DE APOYO INDEPENDIENTE / SPONSOR
  CMS.registerEditorComponent({
    id: "sponsor",
    label: "🤝 Caja de Apoyo / Sponsor",
    fields: [
      {name: "marca", label: "Nombre de la Marca", widget: "string"},
      {name: "link", label: "Link del sponsor", widget: "string"}
    ],
    pattern: /^{{< sponsor marca="(.*?)" link="(.*?)" >}}$/,
    fromBlock: function(match) {
      return { marca: match[1], link: match[2] };
    },
    toBlock: function(obj) {
      return `{{< sponsor marca="${obj.marca || ''}" link="${obj.link || ''}" >}}`;
    },
    toPreview: function(obj) {
      return `<div style="padding: 1rem; border-left: 4px solid #d32f2f; background: #f9f9f9; text-align: center;">🤝 Apoyo Independiente: ${obj.marca}</div>`;
    }
  });
</script>
  </body>
</html>
