<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel Editorial | Meridiano 58</title>
  </head>
  <body>
    <!-- 1. Carga el motor base de Identity -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    
    <!-- 2. Inicialización de la URL forzada, AHORA SÍ adentro del body -->
    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.init({
          APIUrl: "https://meridiano58.netlify.app/.netlify/identity"
        });
        
        window.netlifyIdentity.on("init", user => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });
      }
    </script>

    <!-- 3. Decap CMS arranca al final -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  </body>
</html>
