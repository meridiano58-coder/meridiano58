backend:
  name: git-gateway
  branch: main

publish_mode: editorial_workflow


media_folder: "static/images" 
public_folder: "/images"

collections:
  - name: "fronteras"
    label: "Fronteras"
    folder: "content/fronteras"
    create: true
    delete: false # 2. ESTO BLOQUEA LA ELIMINACIÓN DE NOTAS YA CREADAS
    filter:
      field: "tipo"
      value: "articulo" # 3. FILTRO: Solo muestra archivos que sean artículos, ocultando el index de Hugo
    fields:
      - {label: "Tipo", name: "tipo", widget: "hidden", default: "articulo"} # Etiqueta invisible automática
      - {label: "Título", name: "title", widget: "string"}
      - {label: "Autor", name: "author", widget: "string"}
      - {label: "Mostrar Sponsor", name: "mostrar_sponsor", widget: "boolean", default: false} # <--- EL INTERRUPTOR
      - {label: "Bajada / Copete", name: "description", widget: "text"}
      - {label: "Fecha", name: "date", widget: "datetime"}
      - {label: "Imagen Portada", name: "image", widget: "image", required: false}
      - {label: "Epígrafe de Portada", name: "epigrafe", widget: "string", required: false}
      - {label: "Cuerpo", name: "body", widget: "markdown"}

  - name: "la_lupa"
    label: "La Lupa"
