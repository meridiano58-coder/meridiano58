backend:
  name: git-gateway
  branch: main

# ESTA ES LA MAGIA: Activa el tablero de revisión donde vos tenés la última palabra
publish_mode: editorial_workflow

media_folder: "static/img" # Dónde se guardan las fotos que suban los autores
public_folder: "/img" # Cómo se llama esa carpeta en la web

collections:
  - name: "fronteras"
    label: "Fronteras"
    folder: "content/fronteras"
    create: true
    fields:
      - {label: "Título", name: "title", widget: "string"}
      - {label: "Bajada / Copete", name: "description", widget: "text"}
      - {label: "Fecha", name: "date", widget: "datetime"}
      - {label: "Imagen Portada", name: "image", widget: "image", required: false}
      - {label: "Cuerpo", name: "body", widget: "markdown"}

  - name: "la_lupa"
    label: "La Lupa"
    folder: "content/la-lupa"
    create: true
    fields:
      - {label: "Título", name: "title", widget: "string"}
      - {label: "Bajada / Copete", name: "description", widget: "text"}
      - {label: "Fecha", name: "date", widget: "datetime"}
      - {label: "Imagen Portada", name: "image", widget: "image", required: false}
      - {label: "Cuerpo", name: "body", widget: "markdown"}

  - name: "archivo_58"
    label: "Archivo 58"
    folder: "content/archivo-58"
    create: true
    fields:
      - {label: "Título", name: "title", widget: "string"}
      - {label: "Bajada / Copete", name: "description", widget: "text"}
      - {label: "Fecha", name: "date", widget: "datetime"}
      - {label: "Imagen Portada", name: "image", widget: "image", required: false}
      - {label: "Cuerpo", name: "body", widget: "markdown"}
